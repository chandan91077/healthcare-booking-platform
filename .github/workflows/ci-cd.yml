name: HealthLink CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: healthlink-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend (non-blocking)
        continue-on-error: true
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend-ci:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests (non-blocking)
        continue-on-error: true
        run: npm test -- --ci

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: frontend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy using EC2 SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu

            if [ ! -d "healthcare-booking-platform" ]; then
              git clone https://github.com/chandan91077/healthcare-booking-platform.git
            fi

            cd healthcare-booking-platform
            git pull origin main

            npm install
            npm run build

            cd server
            npm install

            pm2 restart healthcare || pm2 start index.js --name healthcare
